<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karlsruhe SensorCity</title>
    <meta name="description" content="Aktuelle Wetterdaten aus dem Sensornetz der Stadt Karlsruhe – schnell und übersichtlich.">
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌡️</text></svg>">
</head>
<body>
    <header class="app-header">
        <h1>Karlsruhe <span class="accent">SensorCity</span></h1>
    </header>

    <main class="layout">
        <aside class="sidebar" aria-label="Sensorauswahl">
            <div class="search-row">
                <input id="sensorSearch" type="search" placeholder="Standort suchen …" autocomplete="off" spellcheck="false">
            </div>
            <div id="sortControls" class="segmented sort-controls" role="group" aria-label="Sortierung">
                <button type="button" data-sort="name" class="active" title="Alphabetisch">A–Z</button>
                <button type="button" data-sort="warm" title="Wärmste zuerst">Wärmste</button>
                <button type="button" data-sort="cold" title="Kälteste zuerst">Kälteste</button>
            </div>
            <ol id="sensorList" class="sensor-list" aria-label="Sensoren">
                <li class="list-placeholder">
                    <span class="loader"><i></i><i></i><i></i></span> Lade Sensoren …
                </li>
            </ol>
        </aside>

        <section class="content">
            <div id="detail" class="detail-panel">
                <div class="detail-placeholder">
                    <span class="loader loader-lg"><i></i><i></i><i></i></span>
                </div>
            </div>

            <div class="panel map-panel">
                <div class="panel-head">
                    <h2>Karte</h2>
                    <div class="map-tools">
                        <span class="map-tools-label">Wärmekarte</span>
                        <div id="heatControl" class="segmented" role="group" aria-label="Wärmekarte und Farbskala">
                            <button type="button" data-mode="off" class="active" title="Wärmekarte aus">Aus</button>
                            <button type="button" data-mode="comfort" title="Wärmekarte an · feste Skala nach Wohlfühl-Temperatur">Komfort</button>
                            <button type="button" data-mode="relative" title="Wärmekarte an · Skala auf die aktuellen Messwerte gedehnt">Relativ</button>
                        </div>
                    </div>
                </div>
                <div id="map" class="map" role="application" aria-label="Sensorkarte"></div>
                <div id="scaleLegend" class="scale-legend" aria-hidden="true"></div>
            </div>

            <div class="panel chart-panel">
                <div class="panel-head">
                    <h2>Verlauf</h2>
                    <div class="chart-controls">
                        <div id="metricControls" class="segmented" role="group" aria-label="Messgröße">
                            <button type="button" data-metric="temp" class="active" title="Temperatur">Temp</button>
                            <button type="button" data-metric="humidity" title="Luftfeuchtigkeit">Luftfeuchtigkeit</button>
                            <button type="button" data-metric="pressure" title="Luftdruck">Druck</button>
                            <button type="button" data-metric="radiation" title="Sonneneinstrahlung">Sonne</button>
                        </div>
                        <div id="rangeControls" class="range-controls" role="group" aria-label="Zeitraum">
                            <button type="button" data-days="1">24 h</button>
                            <button type="button" data-days="7" class="active">7 Tage</button>
                            <button type="button" data-days="30">30 Tage</button>
                        </div>
                    </div>
                </div>
                <div id="chart" class="chart"></div>
            </div>
        </section>
    </main>

    <footer class="app-footer">
        <span>Datenquelle: Stadt Karlsruhe</span>
        <span>·</span>
        <a href="https://geoportal.karlsruhe.de/sensorcity/Dashboard/?page=Seite&amp;views=Temperatur">Offizielles Portal</a>
    </footer>

    <script src="vendor/leaflet/leaflet.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
